name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/**"
      - "src/**"
      - "tsup.config.ts"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      bundle_size_gzip_kb: ${{ steps.size.outputs.bundle_size_gzip_kb }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install and build library
        run: |
          npm ci
          npm run build

      - name: Measure bundle size
        id: size
        run: echo "bundle_size_gzip_kb=$(node scripts/bundle-size.mjs)" >> $GITHUB_OUTPUT

      - name: Update README with bundle size
        run: |
          SIZE="${{ steps.size.outputs.bundle_size_gzip_kb }}"
          sed -i "s/\*\*~[0-9.]* KB\*\* gzipped/**~${SIZE} KB** gzipped/g" README.md
          sed -i "s/\*\*~[0-9.]* KB\*\* (core, gzip)/**~${SIZE} KB** (core, gzip)/g" README.md

      - name: Update repo description
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SIZE="${{ steps.size.outputs.bundle_size_gzip_kb }}"
          gh repo edit --description "Reactive stores — ~${SIZE} KB gzip core, every step is inspectable"

      - name: Update site/public/llms.txt with bundle size
        run: |
          SIZE="${{ steps.size.outputs.bundle_size_gzip_kb }}"
          sed -i "s/~[0-9.]* KB gzipped/~${SIZE} KB gzipped/g" site/public/llms.txt

      - name: Install and build site
        env:
          VITE_BUNDLE_SIZE_GZIP_KB: ${{ steps.size.outputs.bundle_size_gzip_kb }}
        run: |
          cd site && npm ci && npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/.vitepress/dist

      - name: Commit README and llms.txt if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md site/public/llms.txt
          git diff --staged --quiet || (git commit -m "chore: update bundle size in README and llms.txt" && git push)

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
