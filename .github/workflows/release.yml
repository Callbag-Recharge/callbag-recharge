# Publishes via npm Trusted Publishing (OIDC). No NPM_TOKEN.
# On npmjs: package → Trusted publisher must reference this exact filename: release.yml
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write # required for npm OIDC trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: npm CLI for OIDC publish (trusted publishing)
        run: npm install -g npm@^11.5.1

      - run: pnpm install --frozen-lockfile

      - name: Verify package (lint, test, build)
        run: |
          pnpm run lint
          pnpm test
          pnpm run build

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: pnpm exec semantic-release
