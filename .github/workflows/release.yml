name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - name: Verify package (lint, test, build)
        run: |
          pnpm run lint
          pnpm test
          pnpm run build

      # Optional: variable SEMANTIC_RELEASE_USE_GITHUB_APP=true + RELEASE_APP_* secrets
      # — see docs/github-actions-release-setup.md (defaults to current repo only)
      - uses: actions/create-github-app-token@v3
        id: app-token
        if: ${{ vars.SEMANTIC_RELEASE_USE_GITHUB_APP == 'true' }}
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Release
        env:
          # PAT in SEMANTIC_RELEASE_GITHUB_TOKEN overrides default (for protected main).
          # With USE_GITHUB_APP, installation token is used instead.
          GITHUB_TOKEN: ${{ vars.SEMANTIC_RELEASE_USE_GITHUB_APP == 'true' && steps.app-token.outputs.token || secrets.SEMANTIC_RELEASE_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm exec semantic-release
